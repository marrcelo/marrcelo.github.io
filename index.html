<!DOCTYPE html>
<html id="app" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      rel="icon"
      href="https://cdn0.iconfinder.com/data/icons/prehistoric-elements-3/64/Dinosaur-dino-brachiosaurus-animal-128.png"
    />
    <link rel="stylesheet" type="text/css" href="index.css" />
    <script src="https://kit.fontawesome.com/e9f6aa8d28.js" crossorigin="anonymous"></script>
    <title>Marcelo Magalhães</title>
  </head>
  <body>
    <div id="app-header" class="app-header light-white-font">
      <img
        src="https://cdn0.iconfinder.com/data/icons/prehistoric-elements-3/64/Dinosaur-dino-brachiosaurus-animal-128.png"
        title="That's what's up!"
      />
      <label class="switch">
        <input id="theme" type="checkbox" onchange="themeSelector()" />
        <span id="icon-theme"></span>
      </label>
      <strong class="switch-label">pt-br</strong>
      <label class="switch">
        <input id="slider" type="checkbox" onchange="languageSelector()" />
        <span class="slider round"></span>
      </label>
      <strong class="switch-label">en</strong>
    </div>
    <div id="app-body" class="app-body light-white-font">
      <div class="content-font content-center">
        <h5>
          <div>
            <p id="site-text-0"></p>
            <p>
              <span id="site-text-1"></span>
              <strong class="name-decoretion">Marcelo</strong>
              <span id="site-text-2"></span>
              <strong class=""><span id="age"></span> </strong>
            </p>
            <span class="typer typer-background-color"></span>
            <p>
              <span id="site-text-3"></span>
              <strong id="site-text-4" class=""></strong>
            </p>
          </div>
        </h5>
      </div>
    </div>
    <div id="app-footer" class="contact footer-center  app-footer">
      <div id="copyright" class="copyright"></div>
      <div class="social-media">
        <a
          id="fa-id-card"
          class="fas fa-id-card"
          href="https://drive.google.com/open?id=1Wm3rVd84kLurlkQEvJU1Yg1MZ-H-bUlx"
          onclick="dataLayer.push({'event': 'resume-click'});"
          target="_blank"
          ><strong><i></i></strong
        ></a>
        <a
          id="fa-linkedin"
          class="fab fa-linkedin"
          href="https://www.linkedin.com/in/marrcelo"
          onclick="dataLayer.push({'event': 'linkedin-click'});"
          target="_blank"
          ><strong><i></i></strong
        ></a>
        <a
          id="fa-envelope"
          class="fa fa-envelope"
          href="mailto:magalhaesmarcelo@outlook.com.br"
          onclick="dataLayer.push({'event': 'email-click'});"
          target="_blank"
          ><strong><i></i></strong
        ></a>
        <a
          id="fa-telegram-plane"
          class="fab fa-telegram-plane"
          href="https://www.t.me/Marrcelo"
          onclick="dataLayer.push({'event': 'telegram-click'});"
          target="_blank"
          ><strong><i></i></strong
        ></a>
        <a
          id="fa-github"
          class="fab fa-github"
          href="https://github.com/marrcelo"
          onclick="dataLayer.push({'event': 'github-click'});"
          target="_blank"
          ><strong><i></i></strong
        ></a>
        <a
          id="fa-twitter"
          class="fab fa-twitter"
          href="http://www.twitter.com/marrcelo_"
          onclick="dataLayer.push({'event': 'twitter-click'});"
          target="_blank"
          ><strong><i></i></strong
        ></a>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.9"></script>
  <script src="index.js"></script>
</html>
